name: Execute the tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
      name: Run code linters
      runs-on: ubuntu-latest
      timeout-minutes: 15
      permissions:
        contents: read

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Install uv
          uses: astral-sh/setup-uv@v5

        - name: Setup Python
          run: uv python install 3.11

        - name: Install dependencies
          run: uv sync --all-groups

        - name: Ruff check
          run: uv run ruff check .

        - name: Ruff format check
          run: uv run ruff format --check .

        - name: Pyright type checking
          run: uv run pyright

  test:
    name: Run UI tests with Allure reporting
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Run UI tests with Allure reporting
        run: uv run pytest tests/ui --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
