name: Execute the tests

on:
  push:
    branches:
      - main
      - work_branch
  pull_request:
    branches:
      - main

jobs:
  lint:
      name: Run code linters
      runs-on: ubuntu-latest
      timeout-minutes: 15
      permissions:
        contents: read

      steps:
        - name: Checkout code
          uses: actions/checkout@v5

        - name: Install uv
          uses: astral-sh/setup-uv@v7

        - name: Setup Python
          run: uv python install 3.11

        - name: Install dependencies
          run: uv sync --all-groups

        - name: Ruff check
          run: uv run ruff check .

        - name: Ruff format check
          run: uv run ruff format --check .

        - name: Pyright type checking
          run: uv run pyright

  ui-tests:
    name: Run UI tests with Allure reporting
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Setup Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Run UI tests with Allure reporting
        run: uv run pytest tests/ui -n auto --alluredir=allure-results

      - name: Upload UI Tests Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-ui-tests
          path: allure-results/

  api-tests:
    name: Run API tests with Allure reporting
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Setup Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run API tests with Allure reporting
        run: uv run pytest tests/api -n auto --alluredir=allure-results

      - name: Upload API Tests Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-api-tests
          path: allure-results/
